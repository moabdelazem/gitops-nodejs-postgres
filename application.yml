apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: gitops-nodejs-postgres
  namespace: argocd
spec:
  description: Project for gitops-nodejs-postgres
  sourceRepos:
    - https://github.com/moabdelazem/gitops-nodejs-postgres.git
  destinations:
    - namespace: gitops-nodejs-postgres
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: "*"
      kind: "*"
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-nodejs-postgres
  namespace: argocd
spec:
  project: gitops-nodejs-postgres
  source:
    repoURL: https://github.com/moabdelazem/gitops-nodejs-postgres.git
    targetRevision: main
    path: charts/gitops-nodejs-postgres
    helm:
      valueFiles:
        - values.yaml
      valuesObject:
        sealedSecret:
          enabled: true
          encryptedData:
            POSTGRES_USER: ""
            POSTGRES_PASSWORD: ""
            POSTGRES_DB: ""
            DATABASE_URL: ""
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-nodejs-postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
