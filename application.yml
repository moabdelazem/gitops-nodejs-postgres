apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitops-nodejs-postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/moabdelazem/gitops-nodejs-postgres.git
    targetRevision: main
    path: charts/gitops-nodejs-postgres
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: gitops-nodejs-postgres
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
