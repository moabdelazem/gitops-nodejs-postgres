{{- if and .Values.secret.create .Values.sealedSecret.enabled }}
{{- fail "Only one of secret.create or sealedSecret.enabled can be true." }}
{{- end }}
{{- if .Values.sealedSecret.enabled }}
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ include "gitops-nodejs-postgres.secretName" . }}
  labels:
    {{- include "gitops-nodejs-postgres.labels" . | nindent 4 }}
  {{- with .Values.sealedSecret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  encryptedData:
    POSTGRES_USER: {{ required "sealedSecret.encryptedData.POSTGRES_USER is required when sealedSecret.enabled=true" .Values.sealedSecret.encryptedData.POSTGRES_USER | quote }}
    POSTGRES_PASSWORD: {{ required "sealedSecret.encryptedData.POSTGRES_PASSWORD is required when sealedSecret.enabled=true" .Values.sealedSecret.encryptedData.POSTGRES_PASSWORD | quote }}
    POSTGRES_DB: {{ required "sealedSecret.encryptedData.POSTGRES_DB is required when sealedSecret.enabled=true" .Values.sealedSecret.encryptedData.POSTGRES_DB | quote }}
    DATABASE_URL: {{ required "sealedSecret.encryptedData.DATABASE_URL is required when sealedSecret.enabled=true" .Values.sealedSecret.encryptedData.DATABASE_URL | quote }}
  template:
    metadata:
      name: {{ include "gitops-nodejs-postgres.secretName" . }}
      labels:
        {{- include "gitops-nodejs-postgres.labels" . | nindent 8 }}
    type: Opaque
{{- end }}
